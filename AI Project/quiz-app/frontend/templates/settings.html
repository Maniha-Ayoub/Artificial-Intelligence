<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizora | Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .settings-card {
            max-width: 600px;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-muted);
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: white;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
        .settings-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .profile-avatar {
            width: 64px;
            height: 64px;
            background: var(--primary-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
            box-shadow: var(--glow-primary);
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="{{ url_for('static', filename='img/logo.png') }}" class="logo-img" alt="Quizora Logo">
                <h1>Quizora <span class="ai-badge">AI</span></h1>
            </div>

            <div class="sidebar-section-title">Navigation</div>
            <nav class="sidebar-nav">
                {% if session.get('role') != 'admin' %}
                <a href="/dashboard" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Student UX
                </a>
                {% else %}
                <a href="/admin_dashboard" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Admin Dashboard
                </a>
                {% endif %}
                <a href="/history" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    History
                </a>
                <a href="/settings" class="nav-item active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    Settings
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-header">
                <div class="header-left">
                    <span>User Profile & Account Settings</span>
                </div>
                <div class="header-right">
                    <button class="btn secondary-btn small-btn" onclick="window.history.back()">Back</button>
                    <button class="btn secondary-btn small-btn" onclick="handleLogout()">Logout</button>
                </div>
            </div>

            <div class="content-area">
                <div class="settings-card artifact-card">
                    <div class="settings-header">
                        <div class="profile-avatar">{{ name[0] }}</div>
                        <div>
                            <h2 style="margin: 0; color: white;">Account Settings</h2>
                            <p style="margin: 0; color: var(--text-muted); font-size: 0.9rem;">Manage your profile and security</p>
                        </div>
                    </div>

                    <form id="settings-form">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="set-name" value="{{ name }}" required>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="set-email" placeholder="Loading..." required>
                        </div>
                        <div class="form-group">
                            <label>New Password (leave blank to keep current)</label>
                            <input type="password" id="set-password" placeholder="••••••••">
                        </div>
                        
                        <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-subtle);">
                            <button type="submit" class="btn primary-btn" style="width: 100%;">Save Changes</button>
                        </div>
                    </form>
                    <div id="settings-msg" class="hidden mt-1 text-center" style="font-size: 0.9rem;"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script>
        // Load current data
        async function loadProfile() {
            try {
                // We can reuse user_stats or add a new endpoint, but let's assume we can get email from somewhere or just add it to session
                // For now, let's just use the name from session and wait for a proper profile API if needed.
                // Actually, let's just make a quick fetch to get user info.
                // (I'll add a helper in script.js or here)
            } catch (e) { console.error(e); }
        }

        document.getElementById('settings-form').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('set-name').value;
            const email = document.getElementById('set-email').value;
            const password = document.getElementById('set-password').value;
            const msg = document.getElementById('settings-msg');

            try {
                const res = await fetch('/api/update_profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                if(data.success) {
                    msg.innerText = "Profile updated successfully!";
                    msg.style.color = "var(--diff-easy)";
                    msg.classList.remove('hidden');
                    setTimeout(() => window.location.reload(), 1500);
                } else {
                    msg.innerText = data.error || "Update failed.";
                    msg.style.color = "var(--diff-hard)";
                    msg.classList.remove('hidden');
                }
            } catch (err) {
                msg.innerText = "An error occurred.";
                msg.classList.remove('hidden');
            }
        };

        // Initialize email (we might need to fetch this from backend if not in session)
        // Let's assume we can get it from a new endpoint or just leave it for now.
    </script>
</body>
</html>
