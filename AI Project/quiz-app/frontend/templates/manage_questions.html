<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizora | Manage Questions</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="{{ url_for('static', filename='img/logo.png') }}" class="logo-img" alt="Quizora Logo">
                <h1>Quizora <span class="ai-badge">AI</span></h1>
            </div>

            <div class="sidebar-section-title">Navigation</div>
            <nav class="sidebar-nav">
                <a href="/admin_dashboard" class="nav-item active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Admin Dashboard
                </a>
                <a href="/settings" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    Settings
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-header">
                <div class="header-left">
                    <span>Manage Questions Pipeline</span>
                </div>
                <div class="header-right">
                    <button class="btn secondary-btn small-btn" onclick="window.location.href='/admin_dashboard'">Back</button>
                    <button class="btn secondary-btn small-btn" onclick="handleLogout()">Logout</button>
                </div>
            </div>

            <div class="content-area">
                <h1 class="page-title">Manage Questions</h1>

                <div class="artifact-card mb-2">
                    <h3 style="margin-bottom: 1rem;">Add Question Data</h3>
                    <form id="add-question-form" onsubmit="handleAddQuestion(event)">
                        <div class="grid-2">
                            <div>
                                <label>Assign to Exam (Optional)</label>
                                <select id="q-exam" style="margin-bottom: 1rem;">
                                    <option value="">None (Learning Pool)</option>
                                    {% for exam in exams %}
                                    <option value="{{ exam.id }}">{{ exam.title }} ({{ exam.category }})</option>
                                    {% endfor %}
                                </select>
                                
                                <label>Category</label>
                                <input type="text" id="q-category" required placeholder="e.g. Python Basics" style="margin-bottom: 1rem;">
                                
                                <label>Difficulty Level</label>
                                <select id="q-diff" style="margin-bottom: 1rem;">
                                    <option value="Easy">Easy</option>
                                    <option value="Medium">Medium</option>
                                    <option value="Hard">Hard</option>
                                </select>
                            </div>

                            <div>
                                <label>Question Text</label>
                                <textarea id="q-text" rows="3" required placeholder="Enter the exact question..." style="margin-bottom: 1rem;"></textarea>

                                <div class="grid-2" style="gap: 0.5rem; margin-bottom: 1rem;">
                                    <div>
                                        <label>Option A</label>
                                        <input type="text" id="q-opt-a" required>
                                    </div>
                                    <div>
                                        <label>Option B</label>
                                        <input type="text" id="q-opt-b" required>
                                    </div>
                                    <div>
                                        <label>Option C</label>
                                        <input type="text" id="q-opt-c" required>
                                    </div>
                                    <div>
                                        <label>Option D</label>
                                        <input type="text" id="q-opt-d" required>
                                    </div>
                                </div>
                                
                                <label>Correct Answer Letter (A, B, C, or D)</label>
                                <select id="q-ans">
                                    <option value="A">A</option>
                                    <option value="B">B</option>
                                    <option value="C">C</option>
                                    <option value="D">D</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn primary-btn mt-1" style="width: 100%;">Commit Question to DB</button>
                    </form>
                </div>

                <div class="artifact-card">
                    <h3 style="margin-bottom: 1rem;">Existing Questions Bank</h3>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Category</th>
                                <th>Question</th>
                                <th>Difficulty</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for row in questions %}
                            <tr>
                                <td>{{ row.id }}</td>
                                <td>{{ row.category }}</td>
                                <td style="color: white; max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{ row.question }}</td>
                                <td>
                                    <span class="status-badge" style="{% if row.difficulty_level == 'Easy' %}color: var(--diff-easy); border-color: rgba(16,185,129,0.3);{% elif row.difficulty_level == 'Hard' %}color: var(--diff-hard); border-color: rgba(239,68,68,0.3);{% else %}color: var(--diff-medium); border-color: rgba(245,158,11,0.3);{% endif %}">{{ row.difficulty_level }}</span>
                                </td>
                                <td>
                                    <button class="btn danger-btn small-btn" onclick="deleteQuestion({{ row.id }})">Delete</button>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script>
        async function handleAddQuestion(e) {
            e.preventDefault();
            const data = {
                exam_id: document.getElementById('q-exam').value || null,
                category: document.getElementById('q-category').value,
                difficulty: document.getElementById('q-diff').value,
                question: document.getElementById('q-text').value,
                option_a: document.getElementById('q-opt-a').value,
                option_b: document.getElementById('q-opt-b').value,
                option_c: document.getElementById('q-opt-c').value,
                option_d: document.getElementById('q-opt-d').value,
                correct_answer: document.getElementById('q-ans').value
            };

            try {
                const res = await fetch('/api/manage_questions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    window.location.reload();
                } else {
                    alert(result.error);
                }
            } catch (err) {
                console.error(err);
                alert("An error occurred");
            }
        }

        async function deleteQuestion(id) {
            if(!confirm("Delete this question?")) return;
            try {
                const res = await fetch(`/api/manage_questions/${id}`, { method: 'DELETE' });
                const result = await res.json();
                if (result.success) {
                    window.location.reload();
                } else {
                    alert(result.error);
                }
            } catch(err) {
                console.error(err);
            }
        }
    </script>
</body>
</html>
